name: Build & Verify

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'source/package-lock.json'

      - name: Install dependencies
        working-directory: ./source
        run: npm ci

      - name: TypeScript type check
        working-directory: ./source
        run: npm run check

      - name: Build application
        working-directory: ./source
        run: npm run build

      - name: Verify build output
        working-directory: ./source
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed - dist directory not found!"
            exit 1
          fi
          if [ ! -d "dist/public" ]; then
            echo "Build failed - dist/public directory not found!"
            exit 1
          fi
          if [ ! -f "dist/index.js" ]; then
            echo "Build failed - dist/index.js not found!"
            exit 1
          fi
          echo "Build verified successfully!"
          echo "Client assets:"
          ls -lah dist/public/assets/ | head -10 || echo "No assets directory"
          echo "Server entry:"
          ls -lah dist/index.js

  # NOTE: Deployment is handled automatically by Render and Vercel
  # - Render: Auto-deploys backend on push to main (connected via GitHub integration)
  # - Vercel: Auto-deploys frontend on push to main (connected via GitHub integration)
